<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phoogun Tattoo — Ink Passport</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          crimson: 'var(--color-crimson)',
          primary: '#ffb3ae',
        },
        fontFamily: {
          sans: ['Prompt', 'sans-serif'],
          heading: ['Prompt', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
        },
        keyframes: {
          marquee: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } },
          fadeIn: { '0%': { transform: 'translateY(8px)' }, '100%': { transform: 'translateY(0)' } },
        },
        animation: {
          marquee: 'marquee 35s linear infinite',
          fadeIn: 'fadeIn 0.45s cubic-bezier(.4,0,.2,1)',
        },
      },
    },
  };
</script>
<style>
  :root { --color-crimson: #e6192e; }
  html, body { background: #0a0a0a; }
  body { font-family: 'Prompt', sans-serif; -webkit-font-smoothing: antialiased; }
  .fill-crimson { fill: var(--color-crimson); }
  .glow-hover { transition: box-shadow .3s, border-color .3s; }
  .glow-hover:hover { box-shadow: 0 0 22px rgba(230,25,46,0.16); border-color: rgba(230,25,46,0.35); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--color-crimson); }
  image-slot { --is-bg: #0e0e0e; }
</style>
</head>
<body class="text-gray-200">
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0a0a0a"/>
    <rect x="30" y="26" width="40" height="48" rx="6" fill="none" stroke="#e6192e" stroke-width="3"/>
    <circle cx="50" cy="44" r="7" fill="#e6192e"/>
    <rect x="40" y="56" width="20" height="3.5" rx="1.75" fill="#e6192e"/>
  </svg>
