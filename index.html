async function sheetsGet(sheet, params = {}) {
  const url = new URL(SHEETS_URL);
  url.searchParams.set('sheet', sheet);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'API error');
  return json.data;
}

function ImagePicker({ label, value, onChange, lang, previewClass = 'w-full h-32' }) {
  const fileRef = React.useRef();
  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1400;
        const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        onChange(canvas.toDataURL('image/jpeg', 0.88));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };
  const isBase64 = value && value.startsWith('data:');
  return (
    <div className="space-y-2">
      <Micro className="block text-gray-500">{label}</Micro>
      {value && <img src={value} referrerPolicy="no-referrer" alt="" className={`${previewClass} object-cover rounded-xl border border-[#222]`} onError={e=>e.target.style.display='none'} />}
      <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} className="hidden" />
      <button type="button" onClick={()=>fileRef.current.click()}
        className="w-full border border-dashed border-[#333] hover:border-crimson/60 bg-black/40 hover:bg-crimson/5 text-gray-400 hover:text-crimson text-xs rounded-xl px-4 py-3 transition flex items-center justify-center gap-2 font-sans">
        <Icon name="image" className="w-4 h-4" />
        {tx(lang,'📁 อัปโหลดรูปจากเครื่อง','📁 Upload from device')}
      </button>
      {!isBase64 && (
        <input type="text" value={value||''} onChange={e=>onChange(e.target.value)} placeholder={tx(lang,'หรือวางลิงค์รูปภาพ...','Or paste image URL...')}
          className="w-full bg-black/60 border border-[#2a2a2a] focus:border-crimson/50 outline-none rounded-xl px-4 py-2.5 text-xs text-gray-400 placeholder:text-gray-600 transition font-sans" />
      )}
      {isBase64 && (
        <button type="button" onClick={()=>onChange('')}
          className="text-xs text-gray-600 hover:text-crimson transition font-sans">
          {tx(lang,'✕ ลบรูปนี้','✕ Remove image')}
        </button>
      )}
    </div>
  );
}

// Toast hook
function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((title, msg, type = 'info') => {
    const id = `t${Date.now()}`;
    setToasts(p => [...p, { id, title, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  }, []);
  const dismiss = useCallback(id => setToasts(p => p.filter(t => t.id !== id)), []);
  return { toasts, push, dismiss };
}

function ToastStack({ toasts, dismiss }) {
  const colors = { success: 'border-emerald-500/30 text-emerald-400', error: 'border-rose-500/30 text-rose-400', info: 'border-sky-500/30 text-sky-400', warning: 'border-amber-500/30 text-amber-400' };
  return (
    <div className="fixed bottom-20 sm:bottom-5 right-3 sm:right-5 z-[100] flex flex-col gap-2 w-[calc(100vw-1.5rem)] sm:max-w-sm pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`flex gap-3 p-4 rounded-2xl border bg-neutral-950/95 backdrop-blur shadow-xl pointer-events-auto ${colors[t.type]}`}>
          <div className="flex-1">
            <p className="font-heading font-black text-xs uppercase tracking-wider text-white">{t.title}</p>
            <p className="font-sans text-[11px] text-gray-400 mt-0.5 leading-relaxed">{t.msg}</p>
          </div>
          <button onClick={() => dismiss(t.id)} className="text-gray-600 hover:text-white transition cursor-pointer shrink-0">✕</button>
        </div>
      ))}
    </div>
  );
}

function HeroSection({ lang, config, heroSlides: slidesProp, onBookClick, onGalleryClick }) {
  const slides = (slidesProp && slidesProp.length > 0) ? slidesProp : window.PHG_DATA.HERO_SLIDES;
  const [cur, setCur] = useState(0);
  const [fading, setFading] = useState(false);
  const timerRef = useRef(null);

  const goTo = useCallback((idx) => {
    setFading(true);
    setTimeout(() => {
      setCur((idx + slides.length) % slides.length);
      setFading(false);
    }, 350);
  }, [slides.length]);

  useEffect(() => {
    timerRef.current = setInterval(() => goTo(cur + 1), 5000);
    return () => clearInterval(timerRef.current);
  }, [cur, goTo]);

  const slide = slides[cur];

  return (
    <section id="hero" className="relative w-full" style={{ height: 'min(92vh, 860px)' }}>
      {/* Background image with fade */}
      <div className="absolute inset-0 overflow-hidden">
        <img key={slide.image} src={slide.image} alt=""
          className="w-full h-full object-cover transition-opacity duration-700"
          style={{ opacity: fading ? 0 : 1 }} />
        <div className="absolute inset-0 bg-gradient-to-t from-[#080808] via-[#080808]/70 to-black/50" />
        <div className="absolute inset-0 bg-gradient-to-r from-[#080808]/60 via-transparent to-transparent" />
        {/* Grid overlay */}
        <div className="absolute inset-0 opacity-20 pointer-events-none"
          style={{ backgroundImage: 'linear-gradient(to right,#222 1px,transparent 1px),linear-gradient(to bottom,#222 1px,transparent 1px)', backgroundSize: '64px 64px' }} />
      </div>

      {/* Content */}
      <div className="relative h-full flex flex-col justify-end pb-14 sm:pb-20 lg:pb-24 px-5 sm:px-10 lg:px-20 max-w-7xl mx-auto">

        <div className="inline-flex items-center gap-2 px-3 py-1.5 bg-crimson/10 border border-crimson/30 rounded-full w-fit mb-5">

// Gallery Section + Image Modal
// ============================================================
function GallerySection({ lang, images, categories, albums }) {
  const [selCat, setSelCat] = useState('all');
  const [selAlbum, setSelAlbum] = useState('all');
  const [query, setQuery] = useState('');
  const [modalImg, setModalImg] = useState(null);
  const [sort, setSort] = useState('popular');

  // Featured promoted albums strip
  const promoted = albums.filter(a => a.promoted);

  const filtered = useMemo(() => {
    let list = images.filter(img => img.imageUrl);
    if (selCat !== 'all') list = list.filter(i => i.categoryId === selCat);
    if (selAlbum !== 'all') list = list.filter(i => i.albumId === selAlbum);
    if (query.trim()) {
      const q = query.toLowerCase();
      list = list.filter(i => i.title.toLowerCase().includes(q) || i.artist.toLowerCase().includes(q) || (i.tags || []).some(t => t.includes(q)));
    }
    return sort === 'popular' ? [...list].sort((a, b) => (b.likes || 0) - (a.likes || 0)) : list;
  }, [images, selCat, selAlbum, query, sort]);

  const getCatName = id => {
    const c = categories.find(c => c.id === id);
    return c ? tx(lang, c.nameTh, c.nameEn) : '';
  };

  return (
    <section id="gallery" className="bg-[#080808] py-16 px-4 sm:px-6 lg:px-8">
      <div className="max-w-7xl mx-auto space-y-10">

        {/* Promoted albums strip */}
        {promoted.length > 0 && (
          <div>
            <Micro className="text-crimson/80 block mb-3">{tx(lang, 'อัลบั้มแนะนำ', 'Featured Albums')}</Micro>
            <div className="flex gap-4 overflow-x-auto pb-2">
              {promoted.map(a => (
                <button key={a.id} onClick={() => setSelAlbum(a.id === selAlbum ? 'all' : a.id)}
                  className={`shrink-0 relative w-48 h-28 rounded-2xl overflow-hidden border-2 transition cursor-pointer ${selAlbum === a.id ? 'border-crimson' : 'border-[#222] hover:border-[#444]'}`}>
                  <img src={a.cover} alt={a.name} className="w-full h-full object-cover" />
                  <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent" />
                  <div className="absolute bottom-0 left-0 p-3">
                    <div className="flex items-center gap-1.5 mb-1">
                      <Icon name="promote" className="w-3 h-3 text-amber-400" />
                      <Micro className="text-amber-400">Featured</Micro>
                    </div>
                    <p className="font-heading text-xs font-bold text-white uppercase">{a.name}</p>
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Header + search + sort */}
        <div className="flex flex-col sm:flex-row sm:items-end gap-4 sm:gap-6 justify-between">
          <div>
            <Micro className="text-crimson/80">{tx(lang, 'พอร์ตโฟลิโอ', 'Portfolio')}</Micro>
            <h2 className="font-heading text-3xl sm:text-4xl font-black text-white uppercase mt-1 flex items-center gap-3">
              <span className="w-3 h-3 bg-crimson rounded-sm" />
              {tx(lang, 'ผลงานสักทั้งหมด', 'Master Gallery')}
            </h2>
          </div>
          <div className="flex gap-3 flex-wrap w-full lg:w-auto">
            <input value={query} onChange={e => setQuery(e.target.value)}
              placeholder={tx(lang, 'ค้นหาผลงาน...', 'Search works...')}
              className="bg-[#111] border border-[#222] focus:border-crimson/40 outline-none rounded-full px-4 py-2 text-sm text-white placeholder:text-gray-600 transition flex-1 min-w-0 lg:w-52" />
            <select value={sort} onChange={e => setSort(e.target.value)}
              className="bg-[#111] border border-[#222] text-gray-300 text-xs font-mono uppercase tracking-widest rounded-full px-4 py-2 outline-none cursor-pointer shrink-0">
              <option value="popular">{tx(lang, 'ยอดนิยม', 'Popular')}</option>
              <option value="newest">{tx(lang, 'ล่าสุด', 'Newest')}</option>
            </select>
          </div>
        </div>

        {/* Category filter pills — scrollable on mobile */}
        <div className="-mx-4 sm:mx-0 px-4 sm:px-0 overflow-x-auto">
          <div className="flex gap-2 pb-1 min-w-max sm:min-w-0 sm:flex-wrap">
            <button onClick={() => setSelCat('all')}
              className={`font-mono text-[10px] tracking-widest uppercase px-3.5 py-1.5 rounded-full border transition cursor-pointer whitespace-nowrap ${selCat==='all'?'bg-crimson border-crimson text-white':'border-[#2a2a2a] text-gray-400 hover:text-white hover:border-[#444]'}`}>
              {tx(lang,'ทั้งหมด','All')}
            </button>
            {categories.map(c => (
              <button key={c.id} onClick={() => setSelCat(c.id===selCat?'all':c.id)}
                className={`font-mono text-[10px] tracking-widest uppercase px-3.5 py-1.5 rounded-full border transition cursor-pointer whitespace-nowrap ${selCat===c.id?'bg-crimson border-crimson text-white':'border-[#2a2a2a] text-gray-400 hover:text-white hover:border-[#444]'}`}>
                {tx(lang,c.nameTh,c.nameEn)}
              </button>
            ))}
          </div>
        </div>

        {/* Gallery grid — 1 col mobile, 2 col sm, 3 col md, 4 col lg */}
        <div className="columns-2 sm:columns-2 md:columns-3 lg:columns-4 gap-3 space-y-3">
          {filtered.map(img => (
            <div key={img.id} onClick={() => setModalImg(img)}
              className="break-inside-avoid relative group rounded-xl overflow-hidden cursor-pointer border border-[#222] hover:border-crimson/40 transition-all duration-300">
              <img src={img.imageUrl} alt={img.title} className="w-full object-cover group-hover:scale-105 transition-transform duration-700" />
              <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300" />
              <div className="absolute bottom-0 left-0 right-0 p-3 translate-y-2 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-300">
                <p className="font-heading text-xs font-bold text-white uppercase leading-tight">{img.title}</p>
                <div className="flex items-center justify-between mt-1.5">
                  <Micro className="text-gray-400">{img.artist}</Micro>
                  <span className="flex items-center gap-1 text-crimson">
                    <Icon name="heart" className="w-3 h-3" /><Micro className="text-crimson">{img.likes}</Micro>
                  </span>
                </div>
              </div>
              {img.featured && (
                <div className="absolute top-2 left-2">
                  <span className="bg-crimson text-white font-mono text-[8px] tracking-widest uppercase px-2 py-0.5 rounded">Featured</span>
                </div>
              )}
            </div>
          ))}
          {filtered.length === 0 && (
            <div className="col-span-4 text-center py-20 text-gray-600">
              <Icon name="image" className="w-10 h-10 mx-auto mb-3 opacity-30" />
              <p className="font-mono text-xs">{tx(lang, 'ไม่พบผลงาน', 'No results found')}</p>
            </div>
          )}
        </div>

        <p className="font-mono text-[10px] text-gray-600 text-center">{filtered.length} {tx(lang, 'ผลงาน', 'works')}</p>
      </div>

      {/* Image Modal */}
      {modalImg && (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4 bg-black/90 backdrop-blur-sm" onClick={() => setModalImg(null)}>
          <div className="relative w-full sm:max-w-4xl bg-[#0e0e0e] border border-[#222] sm:rounded-2xl rounded-t-2xl overflow-hidden shadow-2xl max-h-[95vh] sm:max-h-none flex flex-col" onClick={e => e.stopPropagation()}>
            {/* close */}
            <button onClick={() => setModalImg(null)}
              className="absolute top-3 right-3 z-10 w-8 h-8 sm:w-9 sm:h-9 rounded-full bg-black/70 border border-[#333] text-white flex items-center justify-center hover:border-crimson transition cursor-pointer">
              <Icon name="x" className="w-4 h-4" />
            </button>
            <div className="flex flex-col lg:flex-row overflow-y-auto">
              <div className="lg:w-3/5 bg-black">
                <img src={modalImg.imageUrl} alt={modalImg.title} className="w-full max-h-[40vh] sm:max-h-[55vh] lg:max-h-[80vh] object-contain" />
              </div>
              <div className="lg:w-2/5 p-4 sm:p-6 flex flex-col gap-3 sm:gap-4">
                <div>
                  <Micro className="text-crimson/80 block mb-1">{getCatName(modalImg.categoryId)}</Micro>
                  <h3 className="font-heading text-xl font-black text-white uppercase">{modalImg.title}</h3>
                  <p className="font-mono text-xs text-gray-400 mt-1">{tx(lang, 'โดยช่าง', 'by')} {modalImg.artist}</p>
                </div>
                <div className="flex items-center gap-2 text-crimson">
                  <Icon name="heart" className="w-4 h-4 fill-crimson" />
                  <span className="font-mono text-sm text-white">{modalImg.likes}</span>
                  <Micro className="text-gray-500">{tx(lang, 'ไลค์', 'likes')}</Micro>
                </div>
                <div>
                  <Micro className="text-gray-500 block mb-2">{tx(lang, 'แท็ก', 'Tags')}</Micro>
                  <div className="flex flex-wrap gap-2">
                    {(modalImg.tags || []).map(t => (
                      <Badge key={t}>#{t}</Badge>
                    ))}
                  </div>
                </div>
                <div className="mt-auto pt-3 sm:pt-4 border-t border-[#1f1f1f]">
                  <Btn onClick={() => { setModalImg(null); document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' }); }} variant="primary" className="w-full justify-center">
                    <Icon name="phone" className="w-4 h-4" />
                    {tx(lang, 'จองลายนี้', 'Book this style')}
                  </Btn>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </section>
  );
}

function ReviewsSection({ lang, reviews, artists, onSubmitReview }) {
  const [form, setForm] = useState({ author: '', rating: 5, message: '', artist: '' });
  const [submitted, setSubmitted] = useState(false);
  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const submit = e => {
    e.preventDefault();
    if (!form.author.trim() || !form.message.trim()) return;
    if (onSubmitReview) {
      onSubmitReview({ ...form, id: `r${Date.now()}`, status: 'pending', createdAt: new Date().toISOString().split('T')[0] });
    }
    setSubmitted(true);
    setForm({ author: '', rating: 5, message: '', artist: '' });
    setTimeout(() => setSubmitted(false), 4000);
  };

  const approved = reviews.filter(r => r.status === 'approved');
  const avg = approved.length ? (approved.reduce((s, r) => s + r.rating, 0) / approved.length).toFixed(1) : '5.0';

  return (
    <section id="reviews" className="py-12 sm:py-20 px-4 sm:px-6 lg:px-8 bg-[#080808] border-t border-[#1a1a1a]">
      <div className="max-w-7xl mx-auto">
        <div className="text-center mb-12">
          <Micro className="text-crimson/80 block mb-3">{tx(lang, 'รีวิวจากลูกค้า', 'Client Reviews')}</Micro>
          <h2 className="font-heading text-4xl font-black text-white uppercase flex items-center justify-center gap-3">
            <span className="w-3 h-3 bg-crimson rounded-sm" />{tx(lang, 'เสียงจากลูกค้า', 'Testimonials')}
          </h2>
          <div className="flex items-center justify-center gap-3 mt-4">
            <StarRow n={5} size="w-5 h-5" />
            <span className="font-heading text-2xl font-black text-white">{avg}</span>
            <Micro className="text-gray-500">{tx(lang, `จาก ${approved.length} รีวิว`, `from ${approved.length} reviews`)}</Micro>
          </div>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
          {approved.map(r => (
            <div key={r.id} className="bg-[#111] border border-[#222] rounded-2xl p-6 hover:border-[#333] transition">
              <div className="flex items-start justify-between gap-3 mb-4">
                <div>
                  <p className="font-heading text-sm font-bold text-white">{r.author}</p>
                  {r.artist && <Micro className="text-gray-500 block mt-0.5">{tx(lang, 'ช่าง', 'Artist')}: {r.artist}</Micro>}
                </div>
                <StarRow n={r.rating} />
              </div>
              <p className="text-gray-400 text-sm leading-relaxed">"{r.message}"</p>
              <Micro className="text-gray-700 block mt-4">{r.createdAt}</Micro>
            </div>
          ))}
        </div>

        {/* Public review submission form */}
        <div className="mt-16 max-w-2xl mx-auto">
          <div className="text-center mb-6">
            <Micro className="text-crimson/80 block mb-2">{tx(lang, 'แชร์ประสบการณ์', 'Share Your Experience')}</Micro>
            <h3 className="font-heading text-xl font-black text-white uppercase">{tx(lang, 'เขียนรีวิว', 'Write a Review')}</h3>
          </div>
          {submitted ? (
            <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-2xl p-8 text-center">
              <Icon name="check" className="w-10 h-10 text-emerald-400 mx-auto mb-3" />
              <p className="font-heading font-bold text-white uppercase">{tx(lang, 'ขอบคุณสำหรับรีวิว!', 'Thank you for your review!')}</p>
              <p className="text-gray-400 text-sm mt-2">{tx(lang, 'รีวิวของคุณรอการอนุมัติจากทีมงาน', 'Your review is pending approval')}</p>
            </div>
          ) : (
            <form onSubmit={submit} className="bg-[#111] border border-[#222] rounded-2xl p-6 space-y-4">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div className="space-y-1.5">
                  <Micro className="text-gray-500 block">{tx(lang, 'ชื่อของคุณ *', 'Your Name *')}</Micro>
                  <input value={form.author} onChange={e => f('author', e.target.value)} required
                    className="w-full bg-black/60 border border-[#2a2a2a] focus:border-crimson/50 outline-none rounded-xl px-4 py-3 text-sm text-white placeholder:text-gray-600 transition"
                    placeholder={tx(lang, 'ชื่อ-นามสกุล', 'Full Name')} />
                </div>
                <div className="space-y-1.5">
                  <Micro className="text-gray-500 block">{tx(lang, 'ช่างที่ใช้บริการ', 'Artist')}</Micro>
                  <select value={form.artist} onChange={e => f('artist', e.target.value)}
                    className="w-full bg-black/60 border border-[#2a2a2a] text-gray-300 text-sm rounded-xl px-4 py-3 outline-none cursor-pointer focus:border-crimson/50 transition">
                    <option value="">{tx(lang, 'เลือกช่างสัก', 'Select artist')}</option>
                    {(artists || []).map(a => <option key={a.id} value={a.nameTh}>{tx(lang, a.nameTh, a.nameEn)}</option>)}
                  </select>
                </div>
              </div>
              <div className="space-y-2">
                <Micro className="text-gray-500 block">{tx(lang, 'คะแนน', 'Rating')}</Micro>
                <div className="flex gap-2">
                  {[1,2,3,4,5].map(n => (
                    <button key={n} type="button" onClick={() => f('rating', n)}
                      className={`w-10 h-10 rounded-xl border transition cursor-pointer font-heading font-bold text-sm ${form.rating >= n ? 'bg-crimson border-crimson text-white' : 'border-[#2a2a2a] text-gray-500 hover:text-white'}`}>
                      {n}
                    </button>
                  ))}

// ── Image Cards Grid ──────────────────────────────────────
const BLANK_IMG = { title:'', artist:'', categoryId:'', albumId:'', imageUrl:'', tags:'', featured:false, likes:0 };

function ImagesGrid({ lang, images, setImages, albums, categories, toast }) {
  const [modal, setModal] = useState(null); // null | 'add' | image object
  const isEdit = modal && modal !== 'add';
  const [form, setForm] = useState(BLANK_IMG);
  const f = (k,v) => setForm(p=>({...p,[k]:v}));
  const tagsArr = t => (t||'').split(',').map(x=>x.trim()).filter(Boolean);

  const open = (img) => {
    if (img === 'add') { setForm(BLANK_IMG); }
    else { setForm({...img, tags:(img.tags||[]).join(', ')}); }
    setModal(img);
  };
  const close = () => setModal(null);

  const save = () => {
    if (!form.title || !form.imageUrl) return toast(tx(lang,'กรอกชื่อและรูปภาพ','Fill title & add an image'),'','warning');
    const row = {...form, tags: tagsArr(form.tags)};
    if (isEdit) {
      const updated = {...modal, ...row};
      setImages(p=>p.map(i=>i.id===modal.id ? updated : i));
      saveToSheets('update','images',{...updated, artistName:updated.artist, tags:(updated.tags||[]).join(',')}, modal.id).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning'));
      toast(tx(lang,'แก้ไขแล้ว','Updated'), form.title, 'success');
    } else {
      const newImg = {...row, id:`img${Date.now()}`};
      setImages(p=>[newImg,...p]);
      saveToSheets('add','images',{...newImg, artistName:newImg.artist, tags:(newImg.tags||[]).join(',')}).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning'));
      toast(tx(lang,'เพิ่มแล้ว','Added'), form.title, 'success');
    }
    close();
  };

  const del = () => {
    saveToSheets('delete','images',{}, modal.id).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning'));
    setImages(p=>p.filter(i=>i.id!==modal.id));
    toast(tx(lang,'ลบแล้ว','Deleted'),'','info');
    close();
  };

  return (
    <>
      <SectionHeader icon="image" title={tx(lang,'จัดการรูปภาพ','Manage Images')}
        sub={`${images.length} ${tx(lang,'รูปทั้งหมด','total images')}`}
        action={<Btn onClick={()=>open('add')} variant="primary" size="sm"><Icon name="plus" className="w-3.5 h-3.5"/>{tx(lang,'เพิ่มรูป','Add Image')}</Btn>} />

      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
        <AddCard onClick={()=>open('add')} label={tx(lang,'เพิ่มรูปใหม่','New Image')} />
        {images.map(img => (
          <button key={img.id} onClick={()=>open(img)}
            className="relative rounded-xl overflow-hidden cursor-pointer border border-[#222] hover:border-crimson/50 transition group text-left aspect-square">
            <img src={img.imageUrl} alt={img.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onError={e=>{e.target.style.background='#1a1a1a';}} />
            <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition" />
            <div className="absolute bottom-0 left-0 right-0 p-2.5 translate-y-1 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all">
              <p className="font-heading text-xs font-bold text-white uppercase truncate leading-tight">{img.title}</p>
              <Micro className="text-gray-400 block mt-0.5 truncate">{img.artist}</Micro>
            </div>
            {img.featured && <div className="absolute top-2 left-2"><span className="bg-crimson text-white font-mono text-[8px] px-1.5 py-0.5 rounded tracking-widest uppercase">★</span></div>}
            <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition">
              <span className="bg-black/70 border border-[#333] text-gray-300 font-mono text-[8px] px-1.5 py-0.5 rounded">♡ {img.likes}</span>
            </div>
          </button>
        ))}
      </div>

      <Modal open={!!modal} onClose={close} icon="image"
        title={isEdit ? tx(lang,'แก้ไขรูปภาพ','Edit Image') : tx(lang,'เพิ่มรูปภาพ','Add Image')}
        footer={<>
          <Btn onClick={save} variant="primary" size="sm"><Icon name="check" className="w-3.5 h-3.5"/>{isEdit ? tx(lang,'บันทึก','Save') : tx(lang,'เพิ่ม','Add')}</Btn>
          {isEdit && <Btn onClick={del} variant="danger" size="sm"><Icon name="trash" className="w-3.5 h-3.5"/>{tx(lang,'ลบ','Delete')}</Btn>}
          <Btn onClick={close} variant="ghost" size="sm">{tx(lang,'ยกเลิก','Cancel')}</Btn>
        </>}>
        <ImagePicker label={tx(lang,'รูปภาพผลงาน','Artwork Image')} value={form.imageUrl} onChange={v=>f('imageUrl',v)} lang={lang} />
        <div className="grid grid-cols-2 gap-3">
          <Input label={tx(lang,'ชื่อผลงาน','Title')} value={form.title} onChange={v=>f('title',v)} />
          <Input label={tx(lang,'ช่างสัก','Artist')} value={form.artist} onChange={v=>f('artist',v)} />
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div className="space-y-1.5">
            <Micro className="text-gray-500">{tx(lang,'หมวดหมู่','Category')}</Micro>
            <select value={form.categoryId} onChange={e=>f('categoryId',e.target.value)} className="w-full bg-black/60 border border-[#2a2a2a] text-gray-300 text-xs rounded-xl px-3 py-2.5 outline-none cursor-pointer">
              <option value="">{tx(lang,'เลือก...','Choose...')}</option>
              {categories.map(c=><option key={c.id} value={c.id}>{tx(lang,c.nameTh,c.nameEn)}</option>)}
            </select>
          </div>
          <div className="space-y-1.5">
            <Micro className="text-gray-500">{tx(lang,'อัลบั้ม','Album')}</Micro>
            <select value={form.albumId} onChange={e=>f('albumId',e.target.value)} className="w-full bg-black/60 border border-[#2a2a2a] text-gray-300 text-xs rounded-xl px-3 py-2.5 outline-none cursor-pointer">
              <option value="">{tx(lang,'เลือก...','Choose...')}</option>
              {albums.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
        </div>
        <Input label={tx(lang,'แท็ก (คั่น ,)','Tags (comma)')} value={form.tags} onChange={v=>f('tags',v)} placeholder="dragon, sleeve, blackwork" />
        <div className="flex items-center gap-6">
          <label className="flex items-center gap-2 cursor-pointer text-sm text-gray-300">
            <input type="checkbox" checked={form.featured} onChange={e=>f('featured',e.target.checked)} className="accent-crimson" />
            {tx(lang,'Featured','Featured')}
          </label>
          <div className="flex items-center gap-2">
            <Micro className="text-gray-500">Likes:</Micro>
            <input type="number" value={form.likes} onChange={e=>f('likes',+e.target.value)} className="w-20 bg-black/60 border border-[#2a2a2a] text-sm text-gray-300 rounded-lg px-2 py-1.5 outline-none" />
          </div>
        </div>
      </Modal>
    </>
  );
}

const BLANK_ALB = { name:'', descTh:'', promoted:false, cover:'' };

function AlbumsGrid({ lang, albums, setAlbums, images, toast }) {
  const [modal, setModal] = useState(null);
  const isEdit = modal && modal !== 'add';
  const [form, setForm] = useState(BLANK_ALB);
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const open = (a) => { setForm(a === 'add' ? BLANK_ALB : {...a}); setModal(a); };
  const close = () => setModal(null);
  const save = () => {
    if (!form.name) return;
    if (isEdit) {
      const updated = {...modal,...form};
      setAlbums(p=>p.map(a=>a.id===modal.id?updated:a));
      saveToSheets('update','albums',{...updated, coverUrl:updated.cover},modal.id).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning'));
      toast(tx(lang,'แก้ไขแล้ว','Updated'), form.name, 'success');
    } else {
      const newAlb = {...form,id:`a${Date.now()}`};
      setAlbums(p=>[...p,newAlb]);
      saveToSheets('add','albums',{...newAlb, coverUrl:newAlb.cover}).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning'));
      toast(tx(lang,'เพิ่มแล้ว','Added'), form.name, 'success');
    }
    close();
  };
  const del = () => { saveToSheets('delete','albums',{},modal.id).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning')); setAlbums(p=>p.filter(a=>a.id!==modal.id)); toast(tx(lang,'ลบแล้ว','Deleted'),'','info'); close(); };

  return (
    <>
      <SectionHeader icon="folder" title={tx(lang,'จัดการอัลบั้ม','Manage Albums')}
        sub={`${albums.length} ${tx(lang,'อัลบั้ม','albums')}`}

      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <AddCard onClick={()=>open('add')} label={tx(lang,'อัลบั้มใหม่','New Album')} />
        {albums.map(a => {
          const count = images.filter(i=>i.albumId===a.id).length;
          return (
            <button key={a.id} onClick={()=>open(a)}
              className="relative rounded-xl overflow-hidden cursor-pointer border border-[#222] hover:border-crimson/50 transition group text-left h-36">
              {a.cover ? <img src={a.cover} alt={a.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" /> : <div className="w-full h-full bg-[#1a1a1a] flex items-center justify-center"><Icon name="folder" className="w-8 h-8 text-gray-600" /></div>}
              <div className="absolute inset-0 bg-gradient-to-t from-black/90 to-transparent" />
              <div className="absolute bottom-0 left-0 right-0 p-3">
                <div className="flex items-center gap-2 mb-1">
                  {a.promoted && <Badge tone="amber"><Icon name="promote" className="w-2.5 h-2.5"/>Promoted</Badge>}
                  <Micro className="text-gray-400">{count} {tx(lang,'รูป','imgs')}</Micro>
                </div>
                <p className="font-heading text-sm font-bold text-white uppercase truncate">{a.name}</p>

            </button>

      <Modal open={!!modal} onClose={close} icon="folder"

          <Btn onClick={save} variant="primary" size="sm"><Icon name="check" className="w-3.5 h-3.5"/>{isEdit ? tx(lang,'บันทึก','Save') : tx(lang,'สร้าง','Create')}</Btn>

      {tab==='content' && <ContentCards lang={lang} config={config} setConfig={setConfig} toast={toast} />}
      {tab==='categories' && <CategoriesCards lang={lang} categories={categories} setCategories={setCategories} toast={toast} />}
      {tab==='artists' && <ArtistsCards lang={lang} artists={artists} setArtists={setArtists} toast={toast} />}
      {tab==='reviews' && <ReviewCards lang={lang} reviews={reviews} setReviews={setReviews} toast={toast} />}
    </div>
  );
}

// ── Page Content Cards ────────────────────────────────────
function ContentCards({ lang, config, setConfig, toast }) {
  const [modal, setModal] = useState(null);
  const [local, setLocal] = useState({...config});
  const lf = (k,v) => setLocal(p=>({...p,[k]:v}));
  const lfs = (k,i,v) => setLocal(p=>{const s=[...( p.stats||[])];s[i]={...s[i],[k]:v};return {...p,stats:s};});

  const stats = local.stats || [
    {val:'500+',th:'ผลงานสักสำเร็จ',en:'Tattoos Completed'},
    {val:'8+',th:'ปีประสบการณ์',en:'Years Experience'},
    {val:'4',th:'ช่างสักมืออาชีพ',en:'Master Artists'},
    {val:'100%',th:'มาตรฐานโรงพยาบาล',en:'Hospital Grade'},
  ];

  const _sheetsErr = e => toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'), e.message, 'warning');

  const saveHero = () => {
    setConfig(local);
    updateConfig({
      heroTitle:local.heroTitle, heroTitleEn:local.heroTitleEn,
      heroSub:local.heroSub, heroSubEn:local.heroSubEn,
      heroDesc:local.heroDesc, heroDescEn:local.heroDescEn,
    }).catch(_sheetsErr);
    toast(tx(lang,'บันทึก Hero แล้ว','Hero saved'),'','success'); setModal(null);
  };
  const saveAbout = () => {
    setConfig(local);
    updateConfig({
      aboutTitle:local.aboutTitle, aboutTitleEn:local.aboutTitleEn,
      aboutText:local.aboutText, aboutTextEn:local.aboutTextEn,
      aboutImage:local.aboutImage||'',
    }).catch(_sheetsErr);
    toast(tx(lang,'บันทึก About แล้ว','About saved'),'','success'); setModal(null);
  };
  const saveStats = () => {
    const next={...config,...local,stats:local.stats||stats};
    setConfig(next);

    updateConfig({
      stat1Val:s[0]?.val||'', stat1Th:s[0]?.th||'', stat1En:s[0]?.en||'',
      stat2Val:s[1]?.val||'', stat2Th:s[1]?.th||'', stat2En:s[1]?.en||'',
      stat3Val:s[2]?.val||'', stat3Th:s[2]?.th||'', stat3En:s[2]?.en||'',
      stat4Val:s[3]?.val||'', stat4Th:s[3]?.th||'', stat4En:s[3]?.en||'',
    }).catch(_sheetsErr);
    toast(tx(lang,'บันทึกสถิติแล้ว','Stats saved'),'','success'); setModal(null);
  };
  const saveLogo = () => {
    setConfig(local);
    updateConfig({ logoUrl:local.logoUrl||'' }).catch(_sheetsErr);
    toast(tx(lang,'บันทึกโลโก้แล้ว','Logo saved'),'','success'); setModal(null);
  };

  const sections = [
    { key:'logo', icon:'image', label:tx(lang,'โลโก้เว็บไซต์','Website Logo'), preview: config.logoUrl ? tx(lang,'มีโลโก้แล้ว ✓','Logo set ✓') : tx(lang,'ยังไม่มีโลโก้','No logo yet'), sub:tx(lang,'อัปโหลดโลโก้จากเครื่อง','Upload logo from device') },
    { key:'hero', icon:'promote', label:tx(lang,'Hero Section','Hero Section'), preview: tx(lang,config.heroTitle,config.heroTitleEn), sub:tx(lang,'หัวข้อ/subtitle/คำอธิบาย','Title/subtitle/description') },
    { key:'about', icon:'image', label:tx(lang,'About Section','About Section'), preview: tx(lang,config.aboutTitle,config.aboutTitleEn), sub:tx(lang,'หัวข้อ/เนื้อหา/รูปสตูดิโอ','Title/text/studio image') },
    { key:'stats', icon:'bar', label:tx(lang,'สถิติ 4 บล็อก','4 Stat Blocks'), preview: stats.map(s=>s.val).join(' · '), sub:tx(lang,'ตัวเลขและป้ายกำกับ','Numbers & labels') },
  ];

  return (
    <>
      <SectionHeader icon="edit" title={tx(lang,'แก้ไขเนื้อหาหน้าเว็บ','Edit Page Content')} sub={tx(lang,'คลิกการ์ดเพื่อแก้ไข','Click a card to edit')} />
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
        {sections.map(s => (
          <button key={s.key} onClick={()=>{ setLocal({...config}); setModal(s.key); }}

            <div className="w-9 h-9 rounded-xl bg-crimson/10 border border-crimson/30 flex items-center justify-center mb-4 group-hover:bg-crimson/20 transition">
              <Icon name={s.icon} className="w-5 h-5 text-crimson" />
            </div>
            <p className="font-heading text-sm font-bold text-white uppercase">{s.label}</p>
            <Micro className="text-gray-600 block mt-1">{s.sub}</Micro>
            <p className="text-gray-400 text-xs mt-3 truncate">{s.preview}</p>
          </button>
        ))}
      </div>

      {/* Logo Modal */}
      <Modal open={modal==='logo'} onClose={()=>setModal(null)} icon="image" title={tx(lang,'โลโก้เว็บไซต์','Website Logo')}
        footer={<><Btn onClick={saveLogo} variant="primary" size="sm"><Icon name="check" className="w-3.5 h-3.5"/>{tx(lang,'บันทึก','Save')}</Btn><Btn onClick={()=>setModal(null)} variant="ghost" size="sm">{tx(lang,'ยกเลิก','Cancel')}</Btn></>}>
        <p className="text-xs text-gray-500">{tx(lang,'โลโก้นี้จะแสดงที่ navbar และหน้า admin','This logo appears in the navbar and admin panel')}</p>
        <ImagePicker label={tx(lang,'อัปโหลดโลโก้','Upload Logo')} value={local.logoUrl||''} onChange={v=>lf('logoUrl',v)} lang={lang} previewClass="w-24 h-24 mx-auto rounded-full" />
      </Modal>

      {/* Hero Modal */}
      <Modal open={modal==='hero'} onClose={()=>setModal(null)} icon="promote" title="Hero Section"
        footer={<><Btn onClick={saveHero} variant="primary" size="sm"><Icon name="check" className="w-3.5 h-3.5"/>{tx(lang,'บันทึก','Save')}</Btn><Btn onClick={()=>setModal(null)} variant="ghost" size="sm">{tx(lang,'ยกเลิก','Cancel')}</Btn></>}>
        <Input label={tx(lang,'หัวข้อหลัก TH','Main Title TH')} value={local.heroTitle} onChange={v=>lf('heroTitle',v)} />
        <Input label={tx(lang,'หัวข้อหลัก EN','Main Title EN')} value={local.heroTitleEn} onChange={v=>lf('heroTitleEn',v)} />
        <Input label={tx(lang,'หัวข้อรอง TH','Subtitle TH')} value={local.heroSub} onChange={v=>lf('heroSub',v)} />
        <Input label={tx(lang,'หัวข้อรอง EN','Subtitle EN')} value={local.heroSubEn} onChange={v=>lf('heroSubEn',v)} />
        <Textarea label={tx(lang,'คำอธิบาย TH','Description TH')} value={local.heroDesc} onChange={v=>lf('heroDesc',v)} rows={3} />
        <Textarea label={tx(lang,'คำอธิบาย EN','Description EN')} value={local.heroDescEn} onChange={v=>lf('heroDescEn',v)} rows={3} />
      </Modal>

      {/* About Modal */}
      <Modal open={modal==='about'} onClose={()=>setModal(null)} icon="image" title="About Section"
        footer={<><Btn onClick={saveAbout} variant="primary" size="sm"><Icon name="check" className="w-3.5 h-3.5"/>{tx(lang,'บันทึก','Save')}</Btn><Btn onClick={()=>setModal(null)} variant="ghost" size="sm">{tx(lang,'ยกเลิก','Cancel')}</Btn></>}>
        <Input label={tx(lang,'หัวข้อ TH','Title TH')} value={local.aboutTitle} onChange={v=>lf('aboutTitle',v)} />
        <Input label={tx(lang,'หัวข้อ EN','Title EN')} value={local.aboutTitleEn} onChange={v=>lf('aboutTitleEn',v)} />
        <Textarea label={tx(lang,'เนื้อหา TH','Text TH')} value={local.aboutText} onChange={v=>lf('aboutText',v)} rows={3} />
        <Textarea label={tx(lang,'เนื้อหา EN','Text EN')} value={local.aboutTextEn} onChange={v=>lf('aboutTextEn',v)} rows={3} />
        <ImagePicker label={tx(lang,'รูปสตูดิโอ','Studio Image')} value={local.aboutImage||''} onChange={v=>lf('aboutImage',v)} lang={lang} />
      </Modal>

      {/* Stats Modal */}
      <Modal open={modal==='stats'} onClose={()=>setModal(null)} icon="bar" title={tx(lang,'สถิติ 4 บล็อก','4 Stat Blocks')}
        footer={<><Btn onClick={saveStats} variant="primary" size="sm"><Icon name="check" className="w-3.5 h-3.5"/>{tx(lang,'บันทึก','Save')}</Btn><Btn onClick={()=>setModal(null)} variant="ghost" size="sm">{tx(lang,'ยกเลิก','Cancel')}</Btn></>}>
        {stats.map((s,i) => (
          <div key={i} className="bg-black/40 border border-[#1f1f1f] rounded-xl p-4 space-y-2">
            <Micro className="text-gray-500 block">{tx(lang,'บล็อก','Block')} {i+1}</Micro>
            <div className="grid grid-cols-3 gap-2">
              <Input label={tx(lang,'ค่า','Value')} value={s.val} onChange={v=>lfs('val',i,v)} />
              <Input label="TH" value={s.th} onChange={v=>lfs('th',i,v)} />
              <Input label="EN" value={s.en} onChange={v=>lfs('en',i,v)} />
            </div>
          </div>
        ))}
      </Modal>
    </>
  );
}

// ── Category Chips ────────────────────────────────────────
function CategoriesCards({ lang, categories, setCategories, toast }) {
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ nameTh:'', nameEn:'' });
  const isEdit = modal && modal !== 'add';

  const open = c => { setForm(c==='add'?{nameTh:'',nameEn:''}:{nameTh:c.nameTh,nameEn:c.nameEn}); setModal(c); };
  const close = () => setModal(null);
  const save = () => {
    if (!form.nameTh) return;
    if (isEdit) {
      const updated = {...modal,...form};
      setCategories(p=>p.map(c=>c.id===modal.id?updated:c));
      saveToSheets('update','categories',updated,modal.id).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning'));
      toast(tx(lang,'แก้ไขแล้ว','Updated'), form.nameTh,'success');
    } else {
      const newCat = {...form,id:`c${Date.now()}`,slug:form.nameEn.toLowerCase().replace(/\s+/g,'-')};
      setCategories(p=>[...p,newCat]);
      saveToSheets('add','categories',newCat).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning'));
      toast(tx(lang,'เพิ่มแล้ว','Added'), form.nameTh,'success');
    }
    close();
  };
  const del = () => { saveToSheets('delete','categories',{},modal.id).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning')); setCategories(p=>p.filter(c=>c.id!==modal.id)); toast(tx(lang,'ลบแล้ว','Deleted'),'','info'); close(); };

  return (
    <>
      <SectionHeader icon="tag" title={tx(lang,'จัดการหมวดหมู่','Manage Categories')}
        sub={`${categories.length} ${tx(lang,'หมวดหมู่','categories')}`}
        action={<Btn onClick={()=>open('add')} variant="primary" size="sm"><Icon name="plus" className="w-3.5 h-3.5"/>{tx(lang,'เพิ่ม','Add')}</Btn>} />
      <div className="flex flex-wrap gap-2">
        <button onClick={()=>open('add')}
          className="flex items-center gap-1.5 px-3.5 py-2 rounded-full border-2 border-dashed border-[#2a2a2a] hover:border-crimson/50 text-gray-600 hover:text-crimson font-mono text-[10px] tracking-widest uppercase transition cursor-pointer">
          <Icon name="plus" className="w-3 h-3" />{tx(lang,'เพิ่มหมวด','Add')}
        </button>
        {categories.map(c => (
          <button key={c.id} onClick={()=>open(c)}
            className="flex items-center gap-1.5 px-3.5 py-2 rounded-full border border-[#2a2a2a] bg-[#111] hover:border-crimson/50 hover:bg-crimson/5 transition cursor-pointer group">
            <Icon name="tag" className="w-3 h-3 text-gray-500 group-hover:text-crimson transition" />
            <span className="font-mono text-[10px] tracking-widest uppercase text-gray-300 group-hover:text-white">{tx(lang,c.nameTh,c.nameEn)}</span>
          </button>
        ))}
      </div>
      <Modal open={!!modal} onClose={close} icon="tag"
        title={isEdit ? tx(lang,'แก้ไขหมวดหมู่','Edit Category') : tx(lang,'เพิ่มหมวดหมู่','Add Category')}
        footer={<><Btn onClick={save} variant="primary" size="sm"><Icon name="check" className="w-3.5 h-3.5"/>{isEdit?tx(lang,'บันทึก','Save'):tx(lang,'เพิ่ม','Add')}</Btn>{isEdit&&<Btn onClick={del} variant="danger" size="sm"><Icon name="trash" className="w-3.5 h-3.5"/>{tx(lang,'ลบ','Delete')}</Btn>}<Btn onClick={close} variant="ghost" size="sm">{tx(lang,'ยกเลิก','Cancel')}</Btn></>}>
        <Input label={tx(lang,'ชื่อภาษาไทย','Thai Name')} value={form.nameTh} onChange={v=>setForm(p=>({...p,nameTh:v}))} />
        <Input label={tx(lang,'ชื่อภาษาอังกฤษ','English Name')} value={form.nameEn} onChange={v=>setForm(p=>({...p,nameEn:v}))} />
      </Modal>
    </>
  );
}

// ── Artist Cards ──────────────────────────────────────────
const BLANK_ART = { nameTh:'', nameEn:'', specialty:'', experience:'', bio_th:'', imageUrl:'', available:'' };

function ArtistsCards({ lang, artists, setArtists, toast }) {
  const [modal, setModal] = useState(null);

  const f = (k,v) => setForm(p=>({...p,[k]:v}));

    if (!form.nameTh) return;
    if (isEdit) {
      const updated = {...modal,...form};
      setArtists(p=>p.map(a=>a.id===modal.id?updated:a));
      saveToSheets('update','artists',{...updated, specialtyEn:updated.specialty, availableTh:updated.available},modal.id).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning'));
      toast(tx(lang,'แก้ไขแล้ว','Updated'), form.nameTh,'success');
    } else {
      const newArt = {...form,id:`art${Date.now()}`};
      setArtists(p=>[...p,newArt]);
      saveToSheets('add','artists',{...newArt, specialtyEn:newArt.specialty, availableTh:newArt.available}).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning'));
      toast(tx(lang,'เพิ่มแล้ว','Added'), form.nameTh,'success');
    }
    close();
  };
  const del = () => { saveToSheets('delete','artists',{},modal.id).catch(e=>toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'),e.message,'warning')); setArtists(p=>p.filter(a=>a.id!==modal.id)); toast(tx(lang,'ลบแล้ว','Deleted'),'','info'); close(); };

  return (
    <>
      <SectionHeader icon="eye" title={tx(lang,'จัดการช่างสัก','Manage Artists')}

        action={<Btn onClick={()=>open('add')} variant="primary" size="sm"><Icon name="plus" className="w-3.5 h-3.5"/>{tx(lang,'เพิ่มช่าง','Add Artist')}</Btn>} />
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
        <AddCard onClick={()=>open('add')} label={tx(lang,'เพิ่มช่างสัก','Add Artist')} />
        {artists.map(a => (
          <button key={a.id} onClick={()=>open(a)}
            className="bg-[#111] border border-[#222] hover:border-crimson/50 rounded-2xl overflow-hidden cursor-pointer transition group text-left">
            <div className="relative h-36 overflow-hidden">
              {a.imageUrl ? <img src={a.imageUrl} referrerPolicy="no-referrer" alt="" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" /> : <div className="w-full h-full bg-[#1a1a1a] flex items-center justify-center"><Icon name="eye" className="w-8 h-8 text-gray-600" /></div>}
              <div className="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent" />
              <div className="absolute bottom-2 left-2"><Badge tone="crimson">{a.available||'—'}</Badge></div>
            </div>
            <div className="p-3">
              <p className="font-heading text-xs font-bold text-white uppercase truncate">{tx(lang,a.nameTh,a.nameEn)}</p>
              <Micro className="text-crimson block mt-0.5 truncate">{a.specialty}</Micro>
              <Micro className="text-gray-600 block mt-0.5">{a.experience}</Micro>

          <Input label={tx(lang,'ประสบการณ์','Experience')} value={form.experience} onChange={v=>f('experience',v)} placeholder="5 ปี" />

// ── Review Cards ──────────────────────────────────────────
function ReviewCards({ lang, reviews, setReviews, toast }) {
  const [modal, setModal] = useState(null);
  const _rErr = e => toast(tx(lang,'⚠ Sheets ไม่ตอบสนอง','⚠ Sheets unreachable'), e.message, 'warning');
  const approve = id => { setReviews(p=>p.map(r=>r.id===id?{...r,status:'approved'}:r)); saveToSheets('update','reviews',{status:'approved'},id).catch(_rErr); toast(tx(lang,'อนุมัติแล้ว','Approved'),'','success'); setModal(null); };
  const reject = id => { setReviews(p=>p.map(r=>r.id===id?{...r,status:'rejected'}:r)); saveToSheets('update','reviews',{status:'rejected'},id).catch(_rErr); toast(tx(lang,'ปฏิเสธแล้ว','Rejected'),'','info'); setModal(null); };
  const del = id => { setReviews(p=>p.filter(r=>r.id!==id)); saveToSheets('delete','reviews',{},id).catch(_rErr); toast(tx(lang,'ลบแล้ว','Deleted'),'','info'); setModal(null); };

  const counts = { pending:reviews.filter(r=>r.status==='pending').length, approved:reviews.filter(r=>r.status==='approved').length };

  return (
    <>
      <SectionHeader icon="star" title={tx(lang,'จัดการรีวิว','Manage Reviews')}
        sub={`${counts.pending} ${tx(lang,'รอตรวจ','pending')} · ${counts.approved} ${tx(lang,'อนุมัติ','approved')}`} />
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {reviews.map(r => (
          <button key={r.id} onClick={()=>setModal(r)}
            className={`text-left bg-[#111] border rounded-2xl p-5 cursor-pointer transition group ${r.status==='pending'?'border-amber-500/30 hover:border-amber-500/60':r.status==='approved'?'border-emerald-500/20 hover:border-emerald-500/40':'border-[#222] hover:border-[#333]'}`}>
            <div className="flex items-center justify-between gap-3 mb-3">
              <div className="flex items-center gap-2">
                <StarRow n={r.rating} size="w-3 h-3" />
                <Badge tone={r.status==='approved'?'green':r.status==='pending'?'amber':'gray'}>{r.status}</Badge>
              </div>
              <Micro className="text-gray-600">{r.createdAt}</Micro>
            </div>
            <p className="font-heading text-sm font-bold text-white">{r.author}</p>
            {r.artist && <Micro className="text-crimson block mt-0.5">{r.artist}</Micro>}
            <p className="text-gray-500 text-xs mt-2 leading-relaxed line-clamp-2">"{r.message}"</p>
          </button>
        ))}
      </div>

      <Modal open={!!modal} onClose={()=>setModal(null)} icon="star"
        title={tx(lang,'รายละเอียดรีวิว','Review Detail')}
        footer={modal && <>
          {modal.status!=='approved' && <Btn onClick={()=>approve(modal.id)} variant="primary" size="sm"><Icon name="check" className="w-3.5 h-3.5"/>{tx(lang,'อนุมัติ','Approve')}</Btn>}
          {modal.status!=='rejected' && <Btn onClick={()=>reject(modal.id)} variant="outline" size="sm">{tx(lang,'ปฏิเสธ','Reject')}</Btn>}
          <Btn onClick={()=>del(modal.id)} variant="danger" size="sm"><Icon name="trash" className="w-3.5 h-3.5"/>{tx(lang,'ลบ','Delete')}</Btn>
          <Btn onClick={()=>setModal(null)} variant="ghost" size="sm">{tx(lang,'ปิด','Close')}</Btn>
        </>}>
        {modal && (
          <div className="space-y-4">
            <div className="flex items-center gap-3 flex-wrap">
              <StarRow n={modal.rating} size="w-4 h-4" />
              <Badge tone={modal.status==='approved'?'green':modal.status==='pending'?'amber':'gray'}>{modal.status}</Badge>
            </div>

function injectPixels(fbId, ttId) {
  // Remove old pixel scripts
  ['__fb_pixel','__tt_pixel'].forEach(id => { const el = document.getElementById(id); if (el) el.remove(); });
  if (fbId) {
    const s = document.createElement('script');
    s.id = '__fb_pixel';
    s.textContent = `!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','${fbId}');fbq('track','PageView');`;
    document.head.appendChild(s);
  }
  if (ttId) {
    const s = document.createElement('script');
    s.id = '__tt_pixel';
    s.textContent = `!function(w,d,t){w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"],ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var i="https://analytics.tiktok.com/i18n/pixel/events.js";ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=i,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};var o=document.createElement("script");o.type="text/javascript",o.async=!0,o.src=i+"?sdkid="+e+"&lib="+t;var a=document.getElementsByTagName("script")[0];a.parentNode.insertBefore(o,a)};ttq.load('${ttId}');ttq.page();}(window,document,'ttq');`;
    document.head.appendChild(s);
  }
}

function App() {
  const [mode, setMode] = useState('public');
  const [lang, setLang] = useState(() => localStorage.getItem('phg2_lang') || 'TH');
  const [passcode, setPasscode] = useState('');
  const [loginErr, setLoginErr] = useState(false);
  const [adminTab, setAdminTab] = useState('analytics');
  const [sheetsStatus, setSheetsStatus] = useState('loading'); // 'loading' | 'ok' | 'offline'
  const { toasts, push: toast, dismiss } = useToast();

  // Global data state (persisted — pre-filled from localStorage or defaults)
  const [images, setImages] = usePersistedState(LS_KEYS.images, DEFAULT_IMAGES);
  const [albums, setAlbums] = usePersistedState(LS_KEYS.albums, DEFAULT_ALBUMS);
  const [categories, setCategories] = usePersistedState(LS_KEYS.categories, DEFAULT_CATEGORIES);
  const [artists, setArtists] = usePersistedState(LS_KEYS.artists, DEFAULT_ARTISTS);
  const [reviews, setReviews] = usePersistedState(LS_KEYS.reviews, DEFAULT_REVIEWS);
  const [config, setConfig] = usePersistedState(LS_KEYS.config, DEFAULT_CONFIG);
  const [heroSlides, setHeroSlides] = useState(() => lsGet(LS_KEYS.heroSlides, HERO_SLIDES));

  // ── Load fresh data from Google Sheets on mount ───────────
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const d = await loadAllFromSheets();
        if (cancelled) return;
        // Only overwrite state if Sheets actually has data — never wipe localStorage with empty arrays
        if (d.images && d.images.length > 0) setImages(d.images);
        if (d.albums && d.albums.length > 0) setAlbums(d.albums);
        if (d.categories && d.categories.length > 0) setCategories(d.categories);
        if (d.artists && d.artists.length > 0) setArtists(d.artists);
        setReviews(d.reviews || []);
        // Merge config: Sheets data wins for text, but preserve localStorage base64 uploads
        setConfig(prev => ({
          ...d.config,
          logoUrl: d.config.logoUrl || prev.logoUrl || '',
          aboutImage: d.config.aboutImage || prev.aboutImage || '',
        }));
        if (d.heroSlides && d.heroSlides.length > 0) {
          setHeroSlides(d.heroSlides);
          lsSet(LS_KEYS.heroSlides, d.heroSlides);

// Persisted state hook
function usePersistedState(key, defaultVal) {
  const [val, setVal] = useState(() => lsGet(key, defaultVal));
  const setPersisted = useCallback((updater) => {
    setVal((prev) => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      lsSet(key, next);
      return next;
    });
  }, [key]);
  return [val, setPersisted];
}
